<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Example Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <div class="container">
    <!-- CONTACT section -->
    <section id="contact" class="contact">
      <div class="section-wrapper">
        <h2 class="contact__heading">Contact</h2>
        <div class="contact__body">
          <p class="contact__intro">Feel free to reach out for collaborations or just a friendly chat.</p>
          <form class="contact__form">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="contact__submit">Send Message</button>
          </form>
          <div class="contact__links">
            <a href="mailto:your.email@example.com" class="contact__link">your.email@example.com</a>
            <a href="https://github.com/yourusername" class="contact__link" target="_blank">GitHub</a>
            <a href="https://linkedin.com/in/yourusername" class="contact__link" target="_blank">LinkedIn</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="modules/index.js"></script>
</body>

</html>

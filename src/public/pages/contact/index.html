<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Example Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <div class="container">
    <!-- CONTACT section -->
    <section id="contact" class="contact">
      <img src="images/bg-contact.jpg" alt="Background" class="contact__bg-image">
      <div id="spotlightOverlay" class="contact__overlay" />
      <a href="/root/" class="back-btn">←</a>
      <div class="section-wrapper">
        <div class="contact__icons">
          <a href="https://github.com/yk-graph" class="contact__icon" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://www.instagram.com/yuzu_graphics/" class="contact__icon" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://calendly.com/yokokura-tatsuya/30min" class="contact__icon" target="_blank" rel="noopener noreferrer">
            <i class="far fa-calendar"></i>
          </a>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="modules/index.js"></script>
</body>

</html>
